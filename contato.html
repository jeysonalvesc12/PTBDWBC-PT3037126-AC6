<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/forms.css">
</head>
<body>
    <div id="site-header"></div>

    <main class="page">
      <div class="container">
        <h1>Contato</h1>
        <form id="contact-form" class="form-section">
          <label for="nome">Nome:</label>
          <input type="text" id="nome" name="nome" required>

          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required>

          <label for="telefone">Telefone:</label>
          <input type="tel" id="telefone" name="telefone" placeholder="(11) 99999-9999" required>

          <label for="assunto">Assunto:</label>
          <select id="assunto" name="assunto" required>
            <option value="">Selecione uma opção</option>
            <option value="sugestao">Sugestão</option>
            <option value="reclamacao">Reclamação</option>
          </select>

          <label for="mensagem">Mensagem:</label>
          <textarea id="mensagem" name="mensagem" rows="5" required></textarea>

          <fieldset class="choice-group">
            <legend>Preferência de Resposta</legend>
            <label class="radio-option" for="resposta-email">
              <input type="radio" id="resposta-email" name="resposta" value="email" required>
              Email
            </label>
            <label class="radio-option" for="resposta-telefone">
              <input type="radio" id="resposta-telefone" name="resposta" value="telefone" required>
              Telefone
            </label>
          </fieldset>

          <button type="submit" class="btn btn-primary">Enviar</button>
        </form>
      </div>
    </main>
    <div id="site-footer"></div>
    <script src="include-components.js"></script>
    <script>
      document.getElementById('contact-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const nome = document.getElementById('nome').value.trim();
        const email = document.getElementById('email').value.trim();
        const telefone = document.getElementById('telefone').value.trim();
        const assunto = document.getElementById('assunto').value;
        const mensagem = document.getElementById('mensagem').value.trim();
        const resposta = document.querySelector('input[name="resposta"]:checked');
        if (!nome || !email || !telefone || !assunto || !mensagem || !resposta) {
          alert('Por favor, preencha todos os campos obrigatórios.');
          return;
        }
        alert('Mensagem enviada com sucesso!');
        this.reset();
      });
    </script>
</body>
</html>
